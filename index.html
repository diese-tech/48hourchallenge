<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I Died and Woke Up a Support Main</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        color-scheme: dark;
        --bg: #03040a;
        --panel: #080913;
        --panel-2: #0d1020;
        --line: #243071;
        --cyan: #79d8ff;
        --violet: #8b6cff;
        --gold: #f5e642;
        --text: #d9e2ff;
        --muted: #7480aa;
        --warning: #ffcc66;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        min-height: 100svh;
        overflow-x: hidden;
        overflow-y: auto;
        background:
          linear-gradient(rgba(121, 216, 255, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(121, 216, 255, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 50% 18%, rgba(139, 108, 255, 0.14), transparent 34rem),
          linear-gradient(180deg, #050611 0%, #020309 100%);
        background-size: 42px 42px, 42px 42px, auto, auto;
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.032) 0,
          rgba(255, 255, 255, 0.032) 1px,
          transparent 1px,
          transparent 4px
        );
        mix-blend-mode: screen;
        opacity: 0.22;
      }

      .page-shell {
        position: relative;
        z-index: 1;
        width: min(100%, 1440px);
        min-height: 100svh;
        margin: 0 auto;
        padding: clamp(12px, 2vw, 28px);
        display: grid;
        align-content: center;
        gap: 10px;
      }

      .mobile-notice {
        display: none;
        border: 2px solid var(--warning);
        background: #150f05;
        color: var(--warning);
        padding: 10px 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 12px;
        line-height: 1.35;
      }

      .terminal-frame {
        width: 100%;
        min-width: 0;
        border: 3px solid var(--line);
        background: linear-gradient(180deg, rgba(13, 16, 32, 0.96), rgba(5, 6, 16, 0.98));
        box-shadow:
          0 0 0 1px rgba(121, 216, 255, 0.3) inset,
          0 0 42px rgba(45, 76, 180, 0.34),
          12px 12px 0 rgba(0, 0, 0, 0.55);
      }

      .terminal-header,
      .terminal-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-color: var(--line);
        background:
          linear-gradient(90deg, rgba(121, 216, 255, 0.12), transparent 32%),
          var(--panel);
      }

      .terminal-header {
        padding: 12px 14px;
        border-bottom: 2px solid var(--line);
      }

      .terminal-footer {
        padding: 10px 14px;
        border-top: 2px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .title-block {
        display: grid;
        gap: 2px;
      }

      .eyebrow,
      .status-strip span,
      .footer-meta {
        color: var(--cyan);
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        color: var(--gold);
        font-size: clamp(18px, 2vw, 30px);
        line-height: 1.05;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        text-shadow: 0 0 12px rgba(245, 230, 66, 0.2);
      }

      .subtitle {
        color: var(--muted);
        font-size: 13px;
        font-style: italic;
      }

      .status-strip {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .status-strip span {
        border: 1px solid var(--line);
        background: #060817;
        padding: 5px 7px;
      }

      .status-strip span:nth-child(2) {
        color: var(--violet);
      }

      .game-bezel {
        position: relative;
        min-width: 0;
        padding: 10px;
        background:
          linear-gradient(90deg, var(--cyan), transparent 18%, transparent 82%, var(--violet)) top / 100% 2px no-repeat,
          linear-gradient(90deg, var(--violet), transparent 20%, transparent 80%, var(--gold)) bottom / 100% 2px no-repeat,
          #02030a;
      }

      .game-bezel::before,
      .game-bezel::after {
        content: "";
        position: absolute;
        top: 10px;
        bottom: 10px;
        width: 2px;
        pointer-events: none;
        background: linear-gradient(var(--cyan), transparent, var(--violet));
      }

      .game-bezel::before {
        left: 10px;
      }

      .game-bezel::after {
        right: 10px;
      }

      #app {
        width: min(100%, 1280px, calc((100svh - 176px) * 16 / 9));
        aspect-ratio: 16 / 9;
        margin: 0 auto;
        background: #0a0a14;
        overflow: hidden;
      }

      #app canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      .controls {
        color: var(--text);
      }

      .footer-meta {
        color: var(--gold);
        white-space: nowrap;
      }

      @media (max-width: 820px) {
        .page-shell {
          align-content: start;
        }

        .mobile-notice {
          display: block;
        }

        .terminal-header,
        .terminal-footer {
          align-items: flex-start;
          flex-direction: column;
        }

        .status-strip {
          justify-content: flex-start;
        }

        #app {
          width: 100%;
        }
      }

      @media (max-height: 760px) and (min-width: 821px) {
        .page-shell {
          padding-block: 10px;
        }

        .terminal-header {
          padding-block: 8px;
        }

        .terminal-footer {
          padding-block: 8px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell" aria-label="I Died and Woke Up a Support Main game shell">
      <div class="mobile-notice">Best played on desktop with keyboard and mouse.</div>

      <section class="terminal-frame" aria-label="Game terminal">
        <header class="terminal-header">
          <div class="title-block">
            <div class="eyebrow">Frontend Survival Build</div>
            <h1>I Died and Woke Up a Support Main</h1>
            <div class="subtitle">a moba story</div>
          </div>
          <div class="status-strip" aria-label="Build status">
            <span>Support Protocol Active</span>
            <span>A3 Challenge Run</span>
            <span>Canvas/WGL Online</span>
          </div>
        </header>

        <div class="game-bezel">
          <div id="app" aria-label="Playable game canvas"></div>
        </div>

        <footer class="terminal-footer">
          <div class="controls">Move: WASD / Arrows • Heal: 1 • Shield: 2 • Dash: 3 • Pulse/Reflect: 4</div>
          <div class="footer-meta">Best Played Desktop</div>
        </footer>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
